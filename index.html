<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- GitHub Pages: URL pública do site (barra no final é importante) -->
    <base href="https://ekrusch.github.io/casalagune/" />
    <title>Oportunidade Única em Feira de Santana | Imóvel à venda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
      :root {
        --hero-min-h: clamp(320px, 60vh, 640px);
        --whatsapp: #25d366;
        --whatsapp-hover: #1ebe57;
      }
      .hero {
        position: relative;
        min-height: var(--hero-min-h);
        background-color: #1a1a1a;
        background-size: cover;
        background-position: center;
        background-image: url("drone-perto.jpg");
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.7) 100%);
      }
      .hero-content {
        position: relative;
        z-index: 1;
        min-height: var(--hero-min-h);
      }
      .gallery-img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-radius: 0.5rem;
        transition: transform 0.3s;
      }
      .gallery-img:hover {
        transform: scale(1.02);
      }
      .price-new {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 800;
        color: #0d6efd;
      }
      .fab-whatsapp {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 1080;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--whatsapp);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        text-decoration: none;
      }
      .fab-whatsapp:hover {
        color: #fff;
        filter: brightness(1.05);
      }
      .carousel-item img {
        height: min(500px, 55vh);
        object-fit: cover;
      }
    </style>
  </head>
  <body class="bg-light">
    <header class="hero text-white text-center d-flex align-items-center">
      <div class="container hero-content py-5">
        <h1 class="display-4 fw-bold">Oportunidade Única em Feira de Santana</h1>
        <p class="lead">Casa de alto padrão em condomínio exclusivo.</p>
        <div class="mt-4">
          <span class="badge bg-danger fs-5 p-3">DE R$ 2.500.000 POR R$ 2.300.000</span>
        </div>
      </div>
    </header>

    <main class="container py-5">
      <section id="galeria">
        <h2 class="mb-4">Galeria do Imóvel</h2>
        <div class="row g-3">
          <div class="col-md-4">
            <img class="gallery-img" src="drone-longe.jpg" alt="Vista de drone de longe" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="drone-perto.jpg" alt="Vista de drone de perto" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="entrada-condominio.jpg" alt="Entrada do condomínio" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="frente-lateralmente.jpg" alt="Fachada lateral" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="lago-deck.jpg" alt="Lago e deck" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="piscina-zoom.jpg" alt="Piscina" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="piscina.jpg" alt="Área da piscina" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="ponte-lago.jpg" alt="Ponte no lago" />
          </div>
          <div class="col-md-4">
            <img class="gallery-img" src="sala-entrada.jpg" alt="Sala na entrada" />
          </div>
        </div>
      </section>

      <section id="condominio" class="py-5">
        <h2 class="mb-4">O Condomínio (Lagune Ville)</h2>
        <div
          id="carrossel"
          class="carousel slide shadow-lg rounded overflow-hidden"
          data-bs-ride="carousel"
          data-bs-interval="5000"
        >
          <div class="carousel-indicators">
            <button type="button" data-bs-target="#carrossel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carrossel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carrossel" data-bs-slide-to="2" aria-label="Slide 3"></button>
          </div>
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="entrada-condominio.jpg" class="d-block w-100" alt="Entrada do condomínio" />
            </div>
            <div class="carousel-item">
              <img src="lago-deck.jpg" class="d-block w-100" alt="Lago e deck" />
            </div>
            <div class="carousel-item">
              <img src="ponte.jpg" class="d-block w-100" alt="Ponte" />
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carrossel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carrossel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
          </button>
        </div>
      </section>

      <section class="text-center py-5 bg-white rounded shadow-sm">
        <h2 class="text-secondary">Valor de Oportunidade</h2>
        <p class="price-new">R$ 2.300.000,00</p>
        <p class="text-muted">Venda direta com o proprietário.</p>
        <a
          href="https://wa.me/5575999969992?text=Ol%C3%A1%2C%20tenho%20interesse%20na%20casa%20em%20Feira%20de%20Santana"
          class="btn btn-success btn-lg px-5 py-3"
          target="_blank"
          rel="noopener noreferrer"
        >
          AGENDAR VISITA AGORA
        </a>
      </section>
    </main>

    <a
      class="fab-whatsapp"
      href="https://wa.me/5575999969992?text=Ol%C3%A1%2C%20tenho%20interesse%20na%20casa%20em%20Feira%20de%20Santana"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="WhatsApp"
    >
      <i class="bi bi-whatsapp" aria-hidden="true"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
